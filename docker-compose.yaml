services:
  backend-nest-adrian:
    container_name: periscope-backend-adrian
    build:
      context: ./
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PORT=3000 # Port where the NestJS API will run inside the container
      - FASTAPI_URL=http://api:80 # URL of the FastAPI backend for HTTP communication
      - FASTAPI_WS_URL=ws://api:80 # WebSocket URL of the FastAPI backend
      - CLIENT_ID=91667903-7c9f-458d-96a7-e2b16878e437
      - TENANT_ID=aca3c8d6-aa71-4e1a-a10e-03572fc58c0b
    ports:
      - '32791:3000' # Maps container port 3000 to host port 3000
    networks:
      - periscope_network
    restart: always

